<dialog id="p_attendanceLocation" class="p_attendance_location">

    </header>
    <div class="p_body">
      <div class="legend">
        <div class="legend-item"><div class="legend-dot" style="background:#185FA5;"></div>출근</div>
        <div class="legend-item"><div class="legend-dot" style="background:#BA7517;"></div>퇴근</div>
        <div class="legend-item"><div class="legend-dot" style="background:#534AB7;"></div>클러스터</div>
      </div>
      <div class="map-wrap" id="mapWrap" style="background: url(../../images/temp/temp_map.jpg) 50% / cover;">
        <!-- <img src="https://tile.openstreetmap.org/14/13712/6231.png" id="map-svg" alt=""> -->
        <!-- 마커 컨테이너 -->
        <!-- <div id="markerContainer" class="maker_container" > -->
        <div id="" class="maker_container" >
          <div class="maker checkin" style="left: 461.5px; top: 198.648px;">
            <strong>하츄핑</strong><span>09:40</span>
          </div>
          <div class="maker checkout" style="left: 520.1px; top: 233.1px;">
            <strong>하츄핑</strong><span>20:10</span>
          </div> 
          <div class="cluster" style="left: 575px; top: 111px;">2</div>       
        </div>
        <div class="tooltip" style="left: 606.9px; top: 86.937px;">
          <div class="tooltip-name">총 2건</div>

          <hr class="tooltip-divider"><div class="tooltip-row"><div class="tooltip-dot" style="background:#185FA5;"></div>하츄핑 · 출근 09:02</div><div class="tooltip-row"><div class="tooltip-dot" style="background:#BA7517;"></div>하츄핑 · 퇴근 18:15</div>
        </div>
        <!-- 줌 컨트롤 -->
        <div class="zoom_ctrl">
          <button type="button" class="zoom_btn" id="zoomIn">+</button>
          <button type="button" class="zoom_btn" id="zoomOut">−</button>
        </div>
      </div>
    </div>
  </form>
</dialog>
