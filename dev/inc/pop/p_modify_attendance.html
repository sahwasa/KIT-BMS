<dialog class="p_modify_attendance" tabindex="0">
  <form method="dialog">
    <div class="p_header">
      <strong>출퇴근시각 정정</strong>
      <button class="btnClose ico_org cancel" aria-label="close">닫기</button>
    </div>
    <div class="p_info">
      <h3>미입력 혹은 정정할 출퇴근 시각을 입력합니다.</h3>
      <p>사유를 필수로 입력해주세요. 승인자가 승인 후에 적용됩니다.</p>
    </div>
    <div class="p_body">     
      <dl class="ipt_lst">
        <dt><label for="" class="required">출근일시</label></dt>
        <dd class="file_input">
            <input type="date" id="arrival" title="출근일" min="0000-01-01" max="9999-12-31" readonly>
            <input type="time" id="on_time" title="출근시각">
        </dd>         
        <dt><label for="" class="required">퇴근일시</label></dt>
        <dd class="file_input">
          <input type="date" id="departure" title="퇴근일" min="0000-01-01" max="9999-12-31">
          <input type="time" id="off_time" title="퇴근시각">
        </dd>
        <dt><label for="" class="required">사유 </label></dt>
        <dd ><input type="text" id="" /></dd>
      </dl>       
      <div class="btn_wrap">
        <button class="btn_red" type="submit">승인요청</button>
        <button class="btn_gray_line" type="button">닫기</button>
      </div>
    </div>
  </form>
</dialog>
